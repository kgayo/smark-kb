name: IaC Drift Detection

on:
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to check for drift'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  issues: write

env:
  TF_DIR: infra/terraform
  ARM_DIR: infra/arm

jobs:
  parity-check:
    name: Terraform ↔ ARM Parity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run parity checker
        run: python3 infra/scripts/check_parity.py --verbose --json > parity-report.json

      - name: Check parity result
        run: |
          python3 -c "
          import json, sys
          with open('parity-report.json') as f:
              report = json.load(f)
          if report['has_errors']:
              print(f'Parity check FAILED: {report[\"error_count\"]} errors')
              for issue in report['issues']:
                  print(f'  [{issue[\"severity\"]}] {issue[\"message\"]}')
              sys.exit(1)
          else:
              print(f'Parity check passed ({report[\"warning_count\"]} warnings)')
          "

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-report
          path: parity-report.json

  terraform-drift:
    name: Terraform Drift Detection (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    if: >-
      secrets.ARM_CLIENT_ID != '' &&
      secrets.ARM_CLIENT_SECRET != '' &&
      secrets.ARM_SUBSCRIPTION_ID != ''
    defaults:
      run:
        working-directory: infra/terraform
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      TF_VAR_entra_tenant_id: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Init
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          terraform init -backend-config="backend.${ENV}.hcl"

      - name: Terraform Plan (drift detection)
        id: plan
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          terraform plan \
            -var-file="${ENV}.tfvars" \
            -detailed-exitcode \
            -out=drift.tfplan \
            -no-color 2>&1 | tee plan-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Evaluate drift
        id: drift
        run: |
          EXIT_CODE="${{ steps.plan.outputs.exit_code }}"
          if [ "$EXIT_CODE" = "0" ]; then
            echo "No drift detected — infrastructure matches Terraform state."
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" = "2" ]; then
            echo "DRIFT DETECTED — Terraform plan shows changes."
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "Terraform plan failed with exit code $EXIT_CODE"
            echo "drift_detected=error" >> "$GITHUB_OUTPUT"
          fi

      - name: Create drift issue
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('infra/terraform/plan-output.txt', 'utf8');
            const env = '${{ inputs.environment || "dev" }}';
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n... (truncated)'
              : planOutput;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `IaC Drift Detected (${env}) — ${new Date().toISOString().split('T')[0]}`,
              body: [
                '## IaC Drift Detection Report',
                '',
                `**Environment:** ${env}`,
                `**Detected:** ${new Date().toISOString()}`,
                `**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '### Terraform Plan Output',
                '',
                '```',
                truncated,
                '```',
                '',
                '### Action Required',
                '',
                'Infrastructure has drifted from the Terraform state. This may indicate:',
                '- Manual portal changes that need to be imported into Terraform',
                '- External automation modifying resources outside IaC',
                '- State file corruption',
                '',
                'Please investigate and reconcile the drift by either:',
                '1. Updating Terraform config to match the desired state and applying',
                '2. Reverting the manual changes in Azure',
                '',
                '> Generated by [IaC Drift Detection](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/workflows/drift-detection.yml)',
              ].join('\n'),
              labels: ['infrastructure', 'drift'],
            });

      - name: Upload plan output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ inputs.environment || 'dev' }}
          path: |
            infra/terraform/plan-output.txt
