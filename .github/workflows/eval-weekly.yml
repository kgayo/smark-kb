name: Eval — Weekly Full

on:
  schedule:
    # Run weekly on Sunday at 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API base URL (staging)'
        required: false
        type: string
      update_baseline:
        description: 'Update baseline after successful run'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  checks: write
  actions: read

env:
  DATASET_PATH: eval/gold-dataset/baseline.jsonl
  BASELINE_PATH: eval/gold-dataset/eval-baseline.json
  OUTPUT_PATH: eval/eval-report-weekly.json

jobs:
  eval-full:
    name: Weekly Full Evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build eval CLI
        run: dotnet build src/SmartKb.Eval.Cli/SmartKb.Eval.Cli.csproj --configuration Release --no-restore

      - name: Determine API URL
        id: config
        run: |
          URL="${{ inputs.api_url || '' }}"
          if [ -z "$URL" ]; then
            URL="${{ secrets.EVAL_API_BASE_URL }}"
          fi
          echo "api_url=$URL" >> "$GITHUB_OUTPUT"
          echo "has_api=$([ -n "$URL" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Run full eval (live)
        if: steps.config.outputs.has_api == 'true'
        id: eval-live
        run: |
          BASELINE_FLAG=""
          if [ "${{ inputs.update_baseline }}" = "true" ]; then
            BASELINE_FLAG="--update-baseline"
          fi
          dotnet run --project src/SmartKb.Eval.Cli/SmartKb.Eval.Cli.csproj --configuration Release -- \
            --dataset "${{ env.DATASET_PATH }}" \
            --baseline "${{ env.BASELINE_PATH }}" \
            --output "${{ env.OUTPUT_PATH }}" \
            --mode full \
            --api-url "${{ steps.config.outputs.api_url }}" \
            --api-token "${{ secrets.EVAL_API_TOKEN }}" \
            $BASELINE_FLAG
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: Run full eval (offline — dataset validation only)
        if: steps.config.outputs.has_api != 'true'
        id: eval-offline
        run: |
          dotnet run --project src/SmartKb.Eval.Cli/SmartKb.Eval.Cli.csproj --configuration Release -- \
            --dataset "${{ env.DATASET_PATH }}" \
            --baseline "${{ env.BASELINE_PATH }}" \
            --output "${{ env.OUTPUT_PATH }}" \
            --mode full
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-weekly-${{ github.run_number }}
          path: ${{ env.OUTPUT_PATH }}
          if-no-files-found: ignore

      - name: Create issue on blocking regression
        if: failure() && steps.config.outputs.has_api == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reportSummary = 'Report not available.';
            try {
              const report = JSON.parse(fs.readFileSync('${{ env.OUTPUT_PATH }}', 'utf8'));
              reportSummary = `Total: ${report.totalCases}, Success: ${report.successfulCases}, Failed: ${report.failedCases}`;
            } catch {}

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Eval Regression Detected — ${new Date().toISOString().split('T')[0]}`,
              body: [
                '## Weekly Eval Regression',
                '',
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Summary:** ${reportSummary}`,
                '',
                'The weekly full evaluation detected a blocking regression or threshold violation.',
                'Please investigate the eval report artifact for details.',
                '',
                '### Action Required',
                '',
                '1. Review the eval report artifact attached to the workflow run',
                '2. Identify which metrics regressed and root cause',
                '3. Fix the regression or update the baseline if the change is intentional',
                '',
                '> Generated by [Eval Weekly](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/workflows/eval-weekly.yml)',
              ].join('\n'),
              labels: ['eval', 'regression'],
            });
